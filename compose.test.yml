name: pixelpress1-test

services:
  postgres-test:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pixpress1_test
    ports:
      - "55432:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pixpress1_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-deb.debian.org}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-https://registry.npmmirror.com/-/binary/playwright}
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres-test:5432/pixpress1_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres-test:5432/pixpress1_test
      REDIS_URL: redis://redis-test:6379/0
      STORAGE_BACKEND: local
      AUTH_SECRET_KEY: change-me-in-production-but-long-enough-for-tests-123456
      SECRETS_MASTER_KEY: test-secrets-master-key-1234567890abcdef
      RATE_LIMIT_LOGIN: 1000/minute
      RATE_LIMIT_REGISTER: 1000/minute
      RATE_LIMIT_UPLOAD: 1000/minute
      RATE_LIMIT_TASK_TRIGGER: 1000/minute
      RATE_LIMIT_EXPORT: 1000/minute
      CLEANING_PIPELINE_VERSION: b1-local-v1
      CLEANING_ANALYSIS_MAX_PARALLEL: 3
      CLEANING_ROLLOUT_PERCENT: 100
      CLEANING_AUTO_EXCLUDE_MODE: exact_and_clear_quality
      THEME_CURATION_ENABLED: "false"
      THEME_PIPELINE_VERSION: theme-curation-v7-embedding-only
      THEME_CANDIDATE_COUNT: 3
      THEME_RELEVANCE_CALIBRATION_PATH: ""
      CHAPTER_REPRESENTATIVE_PHOTO_COUNT: 3
      CHAPTER_NAMING_MAX_PARALLEL: 2
      CHAPTER_FEATURE_VERSION: c3-semantic-embedding-v1
      CHAPTER_EMBEDDING_PROVIDER: dashscope_multimodal_embedding
      CHAPTER_EMBEDDING_API_URL: https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding
      CHAPTER_EMBEDDING_API_KEY: ""
      CHAPTER_EMBEDDING_MODEL: qwen3-vl-embedding
      CHAPTER_EMBEDDING_DIMENSION: 512
      CHAPTER_EMBEDDING_BATCH_SIZE: 8
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/sitecustomize.py:/app/sitecustomize.py:ro
      - backend_test_uploads:/app/uploads
    command: ["pytest", "tests/integration", "-q"]

volumes:
  postgres_test_data:
  redis_test_data:
  backend_test_uploads:
