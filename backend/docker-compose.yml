version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pixelpress-postgres
    environment:
      POSTGRES_USER: pixelpress
      POSTGRES_PASSWORD: pixelpress
      POSTGRES_DB: pixelpress
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 以下 Redis 服务预留，后续任务队列和缓存使用
  # redis:
  #   image: redis:7-alpine
  #   container_name: pixelpress-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  pgdata:
