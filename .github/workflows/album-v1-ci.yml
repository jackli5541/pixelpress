name: Album V1 CI

on:
  pull_request:
    branches:
      - album-v1
  push:
    branches:
      - album-v1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: album-v1-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Branch policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require a dedicated feature branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            album-v1|main)
              echo "Pull requests must come from a dedicated feature branch."
              exit 1
              ;;
          esac

  backend-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Run backend integration suite
        run: >-
          docker compose -f compose.test.yml up
          --build
          --abort-on-container-exit
          --exit-code-from backend-test
      - name: Clean up test containers
        if: always()
        run: docker compose -f compose.test.yml down -v

  frontend-checks:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
