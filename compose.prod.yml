services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: pixpress1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pixpress1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-deb.debian.org}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-https://registry.npmmirror.com/-/binary/playwright}
    restart: unless-stopped
    shm_size: 1gb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pixpress1
      TEST_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pixpress1_test
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-pixpress1}
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-[\"http://127.0.0.1\",\"http://localhost\"]}"
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER_B1: ${AI_PROVIDER_B1:-}
      AI_PROVIDER_B2: ${AI_PROVIDER_B2:-openai_compatible}
      AI_PROVIDER_B3: ${AI_PROVIDER_B3:-openai_compatible}
      AI_MODE_B1: ${AI_MODE_B1:-hybrid}
      AI_MODE_B2: ${AI_MODE_B2:-llm}
      AI_MODE_B3: ${AI_MODE_B3:-llm}
      AI_FALLBACK_ON_ERROR: ${AI_FALLBACK_ON_ERROR:-true}
      API_KEY: ${API_KEY:-}
      API_URL: ${API_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL_B1: ${AI_MODEL_B1:-}
      AI_MODEL_B2: ${AI_MODEL_B2:-gpt4-mini}
      AI_MODEL_B3: ${AI_MODEL_B3:-gpt4-mini}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-60}
      AI_PROVIDER_MAX_RETRIES: ${AI_PROVIDER_MAX_RETRIES:-2}
      AI_B1_MAX_PARALLEL: ${AI_B1_MAX_PARALLEL:-3}
      AI_IMAGE_MAX_EDGE: ${AI_IMAGE_MAX_EDGE:-1800}
      AI_DEBUG_PERSIST: ${AI_DEBUG_PERSIST:-true}
      RUN_LIVE_AI_TESTS: ${RUN_LIVE_AI_TESTS:-false}
      AI_CHAPTER_PROVIDER: ${AI_CHAPTER_PROVIDER:-}
      AI_CHAPTER_API_URL: ${AI_CHAPTER_API_URL:-}
      AI_CHAPTER_API_KEY: ${AI_CHAPTER_API_KEY:-}
      AI_CHAPTER_MODEL: ${AI_CHAPTER_MODEL:-}
      AI_LAYOUT_PROVIDER: ${AI_LAYOUT_PROVIDER:-}
      AI_LAYOUT_API_URL: ${AI_LAYOUT_API_URL:-}
      AI_LAYOUT_API_KEY: ${AI_LAYOUT_API_KEY:-}
      AI_LAYOUT_MODEL: ${AI_LAYOUT_MODEL:-}
      AI_CHAPTER_EMBEDDING_PROVIDER: ${AI_CHAPTER_EMBEDDING_PROVIDER:-}
      AI_CHAPTER_EMBEDDING_API_URL: ${AI_CHAPTER_EMBEDDING_API_URL:-}
      AI_CHAPTER_EMBEDDING_API_KEY: ${AI_CHAPTER_EMBEDDING_API_KEY:-}
      AI_CHAPTER_EMBEDDING_MODEL: ${AI_CHAPTER_EMBEDDING_MODEL:-}
      OBSERVABILITY_LOG_LEVEL: ${OBSERVABILITY_LOG_LEVEL:-INFO}
      OBSERVABILITY_JSON_LOGS: ${OBSERVABILITY_JSON_LOGS:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      CLEANING_PIPELINE_VERSION: ${CLEANING_PIPELINE_VERSION:-b2-local-v3}
      CLEANING_ANALYSIS_MAX_PARALLEL: ${CLEANING_ANALYSIS_MAX_PARALLEL:-3}
      CLEANING_ROLLOUT_PERCENT: ${CLEANING_ROLLOUT_PERCENT:-100}
      CLEANING_AUTO_EXCLUDE_MODE: ${CLEANING_AUTO_EXCLUDE_MODE:-exact_and_clear_quality}
      CLEANING_HARD_BLUR_MODE: ${CLEANING_HARD_BLUR_MODE:-shadow}
      CLEANING_HARD_BLUR_ROLLOUT_PERCENT: ${CLEANING_HARD_BLUR_ROLLOUT_PERCENT:-0}
      CLEANING_FACE_ANALYSIS_ENABLED: ${CLEANING_FACE_ANALYSIS_ENABLED:-true}
      CLEANING_FACE_MAX_PARALLEL: ${CLEANING_FACE_MAX_PARALLEL:-1}
      CLEANING_POSE_EXPERIMENT_ENABLED: ${CLEANING_POSE_EXPERIMENT_ENABLED:-false}
      THEME_CURATION_ENABLED: ${THEME_CURATION_ENABLED:-true}
      THEME_PIPELINE_VERSION: ${THEME_PIPELINE_VERSION:-theme-curation-v7-embedding-only}
      THEME_CANDIDATE_COUNT: ${THEME_CANDIDATE_COUNT:-3}
      THEME_RELEVANCE_CALIBRATION_PATH: ${THEME_RELEVANCE_CALIBRATION_PATH:-}
      THEME_PROVISIONAL_AUTO_DECISION_ENABLED: ${THEME_PROVISIONAL_AUTO_DECISION_ENABLED:-true}
      THEME_PROVISIONAL_DECISION_THRESHOLD: ${THEME_PROVISIONAL_DECISION_THRESHOLD:-0.60}
      CHAPTER_REPRESENTATIVE_PHOTO_COUNT: ${CHAPTER_REPRESENTATIVE_PHOTO_COUNT:-3}
      CHAPTER_NAMING_MAX_PARALLEL: ${CHAPTER_NAMING_MAX_PARALLEL:-2}
      CHAPTER_FEATURE_VERSION: ${CHAPTER_FEATURE_VERSION:-c3-semantic-embedding-v1}
      CHAPTER_EMBEDDING_PROVIDER: ${CHAPTER_EMBEDDING_PROVIDER:-dashscope_multimodal_embedding}
      CHAPTER_EMBEDDING_API_URL: ${CHAPTER_EMBEDDING_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding}
      CHAPTER_EMBEDDING_API_KEY: ${CHAPTER_EMBEDDING_API_KEY:-}
      CHAPTER_EMBEDDING_MODEL: ${CHAPTER_EMBEDDING_MODEL:-qwen3-vl-embedding}
      CHAPTER_EMBEDDING_DIMENSION: ${CHAPTER_EMBEDDING_DIMENSION:-512}
      CHAPTER_EMBEDDING_BATCH_SIZE: ${CHAPTER_EMBEDDING_BATCH_SIZE:-8}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR_HOST: ${APT_MIRROR_HOST:-deb.debian.org}
        PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-https://registry.npmmirror.com/-/binary/playwright}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pixpress1
      TEST_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/pixpress1_test
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-pixpress1}
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-[\"http://127.0.0.1\",\"http://localhost\"]}"
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER_B1: ${AI_PROVIDER_B1:-}
      AI_PROVIDER_B2: ${AI_PROVIDER_B2:-openai_compatible}
      AI_PROVIDER_B3: ${AI_PROVIDER_B3:-openai_compatible}
      AI_MODE_B1: ${AI_MODE_B1:-hybrid}
      AI_MODE_B2: ${AI_MODE_B2:-llm}
      AI_MODE_B3: ${AI_MODE_B3:-llm}
      AI_FALLBACK_ON_ERROR: ${AI_FALLBACK_ON_ERROR:-true}
      API_KEY: ${API_KEY:-}
      API_URL: ${API_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL_B1: ${AI_MODEL_B1:-}
      AI_MODEL_B2: ${AI_MODEL_B2:-gpt4-mini}
      AI_MODEL_B3: ${AI_MODEL_B3:-gpt4-mini}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-60}
      AI_PROVIDER_MAX_RETRIES: ${AI_PROVIDER_MAX_RETRIES:-2}
      AI_B1_MAX_PARALLEL: ${AI_B1_MAX_PARALLEL:-3}
      AI_IMAGE_MAX_EDGE: ${AI_IMAGE_MAX_EDGE:-1800}
      AI_DEBUG_PERSIST: ${AI_DEBUG_PERSIST:-true}
      RUN_LIVE_AI_TESTS: ${RUN_LIVE_AI_TESTS:-false}
      AI_CHAPTER_PROVIDER: ${AI_CHAPTER_PROVIDER:-}
      AI_CHAPTER_API_URL: ${AI_CHAPTER_API_URL:-}
      AI_CHAPTER_API_KEY: ${AI_CHAPTER_API_KEY:-}
      AI_CHAPTER_MODEL: ${AI_CHAPTER_MODEL:-}
      AI_LAYOUT_PROVIDER: ${AI_LAYOUT_PROVIDER:-}
      AI_LAYOUT_API_URL: ${AI_LAYOUT_API_URL:-}
      AI_LAYOUT_API_KEY: ${AI_LAYOUT_API_KEY:-}
      AI_LAYOUT_MODEL: ${AI_LAYOUT_MODEL:-}
      AI_CHAPTER_EMBEDDING_PROVIDER: ${AI_CHAPTER_EMBEDDING_PROVIDER:-}
      AI_CHAPTER_EMBEDDING_API_URL: ${AI_CHAPTER_EMBEDDING_API_URL:-}
      AI_CHAPTER_EMBEDDING_API_KEY: ${AI_CHAPTER_EMBEDDING_API_KEY:-}
      AI_CHAPTER_EMBEDDING_MODEL: ${AI_CHAPTER_EMBEDDING_MODEL:-}
      OBSERVABILITY_LOG_LEVEL: ${OBSERVABILITY_LOG_LEVEL:-INFO}
      OBSERVABILITY_JSON_LOGS: ${OBSERVABILITY_JSON_LOGS:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      CLEANING_PIPELINE_VERSION: ${CLEANING_PIPELINE_VERSION:-b2-local-v3}
      CLEANING_ANALYSIS_MAX_PARALLEL: ${CLEANING_ANALYSIS_MAX_PARALLEL:-3}
      CLEANING_ROLLOUT_PERCENT: ${CLEANING_ROLLOUT_PERCENT:-100}
      CLEANING_AUTO_EXCLUDE_MODE: ${CLEANING_AUTO_EXCLUDE_MODE:-exact_and_clear_quality}
      CLEANING_HARD_BLUR_MODE: ${CLEANING_HARD_BLUR_MODE:-shadow}
      CLEANING_HARD_BLUR_ROLLOUT_PERCENT: ${CLEANING_HARD_BLUR_ROLLOUT_PERCENT:-0}
      CLEANING_FACE_ANALYSIS_ENABLED: ${CLEANING_FACE_ANALYSIS_ENABLED:-true}
      CLEANING_FACE_MAX_PARALLEL: ${CLEANING_FACE_MAX_PARALLEL:-1}
      CLEANING_POSE_EXPERIMENT_ENABLED: ${CLEANING_POSE_EXPERIMENT_ENABLED:-false}
      THEME_CURATION_ENABLED: ${THEME_CURATION_ENABLED:-true}
      THEME_PIPELINE_VERSION: ${THEME_PIPELINE_VERSION:-theme-curation-v7-embedding-only}
      THEME_CANDIDATE_COUNT: ${THEME_CANDIDATE_COUNT:-3}
      THEME_RELEVANCE_CALIBRATION_PATH: ${THEME_RELEVANCE_CALIBRATION_PATH:-}
      THEME_PROVISIONAL_AUTO_DECISION_ENABLED: ${THEME_PROVISIONAL_AUTO_DECISION_ENABLED:-true}
      THEME_PROVISIONAL_DECISION_THRESHOLD: ${THEME_PROVISIONAL_DECISION_THRESHOLD:-0.60}
      CHAPTER_REPRESENTATIVE_PHOTO_COUNT: ${CHAPTER_REPRESENTATIVE_PHOTO_COUNT:-3}
      CHAPTER_NAMING_MAX_PARALLEL: ${CHAPTER_NAMING_MAX_PARALLEL:-2}
      CHAPTER_FEATURE_VERSION: ${CHAPTER_FEATURE_VERSION:-c3-semantic-embedding-v1}
      CHAPTER_EMBEDDING_PROVIDER: ${CHAPTER_EMBEDDING_PROVIDER:-dashscope_multimodal_embedding}
      CHAPTER_EMBEDDING_API_URL: ${CHAPTER_EMBEDDING_API_URL:-https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding}
      CHAPTER_EMBEDDING_API_KEY: ${CHAPTER_EMBEDDING_API_KEY:-}
      CHAPTER_EMBEDDING_MODEL: ${CHAPTER_EMBEDDING_MODEL:-qwen3-vl-embedding}
      CHAPTER_EMBEDDING_DIMENSION: ${CHAPTER_EMBEDDING_DIMENSION:-512}
      CHAPTER_EMBEDDING_BATCH_SIZE: ${CHAPTER_EMBEDDING_BATCH_SIZE:-8}
    command: ["python", "-m", "arq", "app.jobs.worker.WorkerSettings"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
        NPM_REGISTRY_URL: ${NPM_REGISTRY_URL:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
